<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글 작성하기 - 동양미래대학교 반도체 부트캠프</title>
    <!-- 폰트 적용 (Pretendard) -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="./css/style.css">
    <style>
        .write-container {
            max-width: 900px;
            margin: 120px auto 100px;
            padding: 0 20px;
        }
        
        .breadcrumb {
            text-align: right;
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 20px;
        }
        .breadcrumb span {
            margin: 0 5px;
        }

        .page-title {
            text-align: center;
            font-size: 2.2rem;
            color: #111;
            font-weight: 700;
            margin-bottom: 40px;
        }

        .write-form {
            background-color: #fff;
            border-top: 2px solid #111;
            border-bottom: 1px solid #ddd;
            padding: 30px 20px;
        }

        .form-row {
            display: flex;
            align-items: center;
            border-bottom: 1px solid #eee;
            padding: 15px 0;
        }
        .form-row:last-child {
            border-bottom: none;
        }

        .form-label {
            width: 100px;
            font-weight: 600;
            color: #333;
        }

        .form-input {
            flex: 1;
        }

        .form-input input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
            outline: none;
        }

        .form-input input[type="text"]:focus {
            border-color: var(--deep-blue);
        }

        .form-input textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
            outline: none;
            resize: vertical;
        }
        .form-input textarea:focus {
            border-color: var(--deep-blue);
        }

        .write-actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 40px;
        }

        .btn-cancel {
            background-color: #fff;
            color: #555;
            border: 1px solid #ccc;
            padding: 12px 30px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .btn-cancel:hover {
            background-color: #f5f5f5;
        }

        .btn-submit {
            background-color: var(--deep-blue);
            color: var(--white);
            border: none;
            padding: 12px 40px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-submit:hover {
            background-color: #0b4a99;
        }
    </style>
</head>
<body>
    <!-- 네비게이션 바 (헤더) -->
    <header class="header">
        <div class="container header-container">
            <div class="logo">
                <a href="index.html" style="text-decoration:none;">
                    <span class="highlight">DMU</span> 반도체 부트캠프
                </a>
            </div>
            <nav class="nav-menu">
                <ul>
                    <li><a href="index.html#curriculum">프로그램 소개</a></li>
                    <li><a href="board.html" style="color:var(--electric-blue);">게시판</a></li>
                    <li><a href="#" class="btn-secondary" id="loginBtn" style="color:var(--deep-blue) !important; border-color:var(--deep-blue);">로그인</a></li>
                    <li><a href="apply.html" class="btn-primary">지원하기</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="write-container">
        <!-- 브레드크럼 -->
        <div class="breadcrumb">
            <a href="index.html">🏠</a>
            <span>></span>
            <a href="board.html" style="color:#666; text-decoration:none;">게시판</a>
            <span>></span>
            <strong>글 작성하기</strong>
        </div>

        <h2 class="page-title">글 작성하기</h2>

        <div class="write-form">
            <div class="form-row">
                <div class="form-label">제목</div>
                <div class="form-input">
                    <input type="text" id="postTitle" placeholder="제목을 입력하세요">
                </div>
            </div>
            <div class="form-row">
                <div class="form-label">작성자</div>
                <div class="form-input">
                    <input type="text" id="postAuthor" placeholder="이름을 입력하세요" style="width: 200px;">
                </div>
            </div>
            <div class="form-row" style="align-items: flex-start;">
                <div class="form-label" style="padding-top: 15px;">내용</div>
                <div class="form-input">
                    <textarea id="postContent" rows="12" placeholder="내용을 입력하세요"></textarea>
                </div>
            </div>
        </div>

        <div class="write-actions">
            <a href="board.html" class="btn-cancel">취소</a>
            <button id="btnSubmitPost" class="btn-submit">등록</button>
        </div>

    </main>

    <!-- 스크립트 연결 -->
    <script src="./js/script.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        // 발급받은 Firebase 설정 정보
        const firebaseConfig = {
            apiKey: "AIzaSyD_ocC6LdqJ1HxK-5dga3HJ1r3Eap0lXHk",
            authDomain: "kshfood-f4e24.firebaseapp.com",
            projectId: "kshfood-f4e24",
            storageBucket: "kshfood-f4e24.firebasestorage.app",
            messagingSenderId: "433157257385",
            appId: "1:433157257385:web:c5c6c713bf40f4c35091b8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('btnSubmitPost').addEventListener('click', async () => {
            const title = document.getElementById('postTitle').value.trim();
            const author = document.getElementById('postAuthor').value.trim();
            const content = document.getElementById('postContent').value.trim();

            if (!title || !author || !content) {
                alert('제목, 작성자, 내용을 모두 입력해주세요.');
                return;
            }

            try {
                // posts 컬렉션에 새 문서(글) 추가
                await addDoc(collection(db, "posts"), {
                    title: title,
                    author: author,
                    content: content,
                    createdAt: Date.now(),
                    views: 0
                });
                alert('게시글이 성공적으로 서버에 등록되었습니다.');
                window.location.href = 'board.html';
            } catch (e) {
                console.error("Error adding document: ", e);
                alert("게시물 등록 중 오류가 발생했습니다. (Firestore 설정 및 보안 규칙 확인 필요)");
            }
        });
    </script>
</body>
</html>
